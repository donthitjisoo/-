<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>飆股追蹤器</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">GitHub Pages stock sheet</p>
        <h1>飆股追蹤器</h1>
      </div>
      <div class="market-state">
        <span id="market-dot" class="dot"></span>
        <span id="market-label">檢查中</span>
      </div>
    </header>

    <main>
      <section class="toolbar" aria-label="追蹤工具列">
        <form id="add-form" class="add-form">
          <label>
            股票代號
            <input id="stock-code" inputmode="numeric" maxlength="6" placeholder="2330" autocomplete="off">
          </label>
          <label>
            名稱
            <input id="stock-name" placeholder="台積電" autocomplete="off">
          </label>
          <label>
            觀察價
            <input id="target-price" inputmode="decimal" placeholder="可空白">
          </label>
          <button type="submit">加入</button>
        </form>

        <div class="actions">
          <button id="refresh-btn" type="button">更新報價</button>
          <button id="export-btn" type="button">匯出 CSV</button>
          <label class="import-btn">
            匯入 CSV
            <input id="import-file" type="file" accept=".csv,text/csv">
          </label>
        </div>
      </section>

      <section class="stats" aria-label="追蹤摘要">
        <div>
          <span class="stat-label">追蹤檔數</span>
          <strong id="stat-count">0</strong>
        </div>
        <div>
          <span class="stat-label">上次更新</span>
          <strong id="stat-updated">尚未更新</strong>
        </div>
        <div>
          <span class="stat-label">資料源</span>
          <strong id="stat-source">TWSE MIS</strong>
        </div>
      </section>

      <section class="sheet-section">
        <div class="sheet-head">
          <div>
            <h2>觀察清單</h2>
            <p id="status-line">資料會存在這台電腦的瀏覽器中。</p>
          </div>
          <label class="search">
            搜尋
            <input id="search-input" placeholder="代號或名稱">
          </label>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th data-sort="code">代號</th>
                <th data-sort="name">名稱</th>
                <th data-sort="last">成交</th>
                <th data-sort="changePercent">漲跌幅</th>
                <th data-sort="volume">總量</th>
                <th>開高低</th>
                <th>觀察價</th>
                <th>筆記</th>
                <th aria-label="操作"></th>
              </tr>
            </thead>
            <tbody id="stock-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <template id="row-template">
      <tr>
        <td class="code-cell"></td>
        <td class="name-cell"></td>
        <td class="last-cell numeric"></td>
        <td class="change-cell numeric"></td>
        <td class="volume-cell numeric"></td>
        <td class="ohl-cell"></td>
        <td><input class="target-input" inputmode="decimal" aria-label="觀察價"></td>
        <td><input class="note-input" aria-label="筆記"></td>
        <td><button class="remove-btn" type="button" aria-label="移除">刪除</button></td>
      </tr>
    </template>

    <script src="app.js"></script>
  </body>
</html>
