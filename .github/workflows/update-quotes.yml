name: Update stock quotes

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 1-6 * * 1-5"

permissions:
  contents: write

jobs:
  update-quotes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/fetch-quotes.mjs
      - name: Commit quote cache
        run: |
          if git diff --quiet quotes.json; then
            echo "No quote changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add quotes.json
            git commit -m "Update quote cache"
            git push
          fi
