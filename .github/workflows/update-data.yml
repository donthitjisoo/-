name: Update financial data and deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "data/**"
      - "scripts/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "tsconfig*.json"
      - ".github/workflows/update-data.yml"
      - "watchlist.json"
  schedule:
    - cron: "*/5 1-6 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages-financial-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Generate static financial JSON
        run: npm run update:data
      - name: Commit updated static data
        run: |
          if git diff --quiet public/data quotes.json; then
            echo "No data changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data quotes.json
            git commit -m "Update financial data"
            git push
          fi
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
